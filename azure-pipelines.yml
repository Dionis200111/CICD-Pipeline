# Maven
# Build your Java project and run tests with Apache Maven.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/java

trigger:
- main

# 1. Target your local self-hosted Windows agent
pool:
  name: 'Default' 

variables:
  # The Docker Registry service connection
  dockerRegistryServiceConnection: 'my-acr-connection' 
  # The name of the repository inside your Azure Container Repo
  imageRepository: 'my-tomcat-application' 
  # Dockerfile path
  dockerfilePath: '$(Build.SourcesDirectory)/maven-project/Dockerfile'
  # Gives a new tag to every image build 
  tag: '$(Build.BuildId)'

steps:
# 2. Build the Java package using Maven
- task: Maven@3
  displayName: 'Maven Package'
  inputs:
    mavenPomFile: 'maven-project/pom.xml'
    mavenOptions: '-Xmx3072m'
    javaHomeOption: 'JDKVersion'
    jdkVersionOption: '1.11'
    jdkArchitectureOption: 'x64'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
    goals: 'clean package'


# 3. Build and Push the Docker Image to ACR
- task: Docker@2
  displayName: 'Build and Push Docker Image to ACR'
  inputs:
    containerRegistry: '$(dockerRegistryServiceConnection)'
    repository: '$(imageRepository)'
    command: 'buildAndPush'
    Dockerfile: '$(dockerfilePath)'
    buildContext: '$(Build.SourcesDirectory)/maven-project' 
    tags: |
      $(tag)
      latest

# 4. Deploy the Container to Azure App Service
# (This step uses your existing 'AzureConnection' from your screenshot!)
- task: AzureWebAppContainer@1
  displayName: 'Deploy Container to App Service'
  inputs:
    azureSubscription: 'firstdeploywebapp'
    appName: 'firstdeploytest'
    imageName: '$(imageRepository):$(tag)'
